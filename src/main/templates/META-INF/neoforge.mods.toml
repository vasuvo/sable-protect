modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''
Protection commands for Sable airships on NeoForge 1.21.1.
'''

[[mixins]]
config = "sableprotect.mixins.json"

[[dependencies.sableprotect]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.sableprotect]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.sableprotect]]
modId = "sable"
type = "required"
versionRange = "[1.1.3,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.sableprotect]]
modId = "simulated"
type = "required"
versionRange = "[0.0.1,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.sableprotect]]
modId = "veil"
type = "required"
versionRange = "[3.6,)"
ordering = "AFTER"
side = "BOTH"
